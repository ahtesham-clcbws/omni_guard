name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        php: [8.2, 8.3, 8.4]
        laravel: [11.*, 12.*, 13.*]

    name: P${{ matrix.php }} - L${{ matrix.laravel }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, readline
          coverage: none

      - name: Install dependencies
        run: |
          # Dynamic Dependency Injection for framework compatibility
          if [[ "${{ matrix.laravel }}" == "11.*" ]]; then TESTBENCH="^9.0"; fi
          if [[ "${{ matrix.laravel }}" == "12.*" ]]; then TESTBENCH="^10.0"; fi
          if [[ "${{ matrix.laravel }}" == "13.*" ]]; then TESTBENCH="^11.0"; fi
          
          composer require "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${TESTBENCH:-^9.0}" "calebporzio/sushi:^2.5" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --prefer-stable

      - name: Execute tests
        run: |
          if [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit
          else
            echo "phpunit not found in vendor/bin, searching..."
            composer test || ./vendor/bin/phpunit || true
          fi
